<mat-table [dataSource]="characters">
    <ng-container matColumnDef="name">
        <mat-header-cell *matHeaderCellDef>Nombre</mat-header-cell>
        <mat-cell *matCellDef="let character">{{ character.name }}</mat-cell>
    </ng-container>
    <ng-container matColumnDef="race">
        <mat-header-cell *matHeaderCellDef>Rasa</mat-header-cell>
        <mat-cell *matCellDef="let character">{{ character.race }}</mat-cell>
    </ng-container>
    <ng-container matColumnDef="ki">
        <mat-header-cell *matHeaderCellDef>Ki</mat-header-cell>
        <mat-cell *matCellDef="let character">{{ character.ki }}</mat-cell>
    </ng-container>
    <ng-container matColumnDef="affiliation">
        <mat-header-cell *matHeaderCellDef>Afiliación</mat-header-cell>
        <mat-cell *matCellDef="let character">{{ character.affiliation }}</mat-cell>
    </ng-container>

    <mat-header-row *matHeaderRowDef="displayedColumns"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;"></mat-row>
</mat-table>
