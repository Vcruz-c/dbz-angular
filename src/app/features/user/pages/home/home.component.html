<div class="grid-container">
  <mat-card *ngFor="let character of characters">
    <img [src]="character.image">
    <mat-card-content>
        <p>{{ character.name }}</p>
        <p>{{ character.race }}</p>
        <p>{{ character.ki }}</p>
        <p>{{ character.affiliation }}</p>
    </mat-card-content>
  </mat-card>
</div>
