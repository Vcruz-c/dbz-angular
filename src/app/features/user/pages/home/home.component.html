<div class="grid-container">
  <mat-card *ngFor="let character of characters">
    <img [src]="character.image">
    <mat-card-content>
        <p>Nombre: {{ character.name }}</p>
        <p>Raza: {{ character.race }}</p>
        <p>Ki: {{ character.ki }}</p>
        <p> Afiliación: {{ character.affiliation }}</p>
    </mat-card-content>
  </mat-card>
</div>
